---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: bambulab-metrics-exporter
spec:
  allowCrossNamespaceImport: true
  url: https://grafana.com/api/dashboards/25033/revisions/2/download
  instanceSelector:
    matchLabels:
      dashboards: grafana
  datasources:
  - datasourceName: prometheus
    inputName: DS_PROMETHEUS
