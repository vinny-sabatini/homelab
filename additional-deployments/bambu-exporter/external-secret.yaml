---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: bambu-token
spec:
  refreshInterval: 1h0m0s
  secretStoreRef:
    name: bitwarden-secretsmanager
    kind: ClusterSecretStore
  data:
    - secretKey: token
      remoteRef:
        key: "bambu_token"
        metadataPolicy: None
        decodingStrategy: None
        conversionStrategy: Default
