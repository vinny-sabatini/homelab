---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/instance: bambu-exporter
    app.kubernetes.io/name: bambu-exporter
    app.kubernetes.io/version: 1.5.0
  name: bambu-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: bambu-exporter
      app.kubernetes.io/name: bambu-exporter
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: bambu-exporter
        app.kubernetes.io/name: bambu-exporter
    spec:
      containers:
      - env:
        - name: BAMBULABS_USERNAME
          value: "bblp"
        - name: BAMBULABS_TOPIC
          value: "device/22E8AJ5A1000413/report"
        - name: BAMBULABS_IP
          value: "192.168.1.244"
        - name: BAMBULABS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: bambu-token
              key: token
        image: ghcr.io/halkeye/bambulabs-exporter:1.5.0
        name: bambu-exporter
        ports:
        - containerPort: 9101
          name: http
          protocol: TCP
        readinessProbe:
          failureThreshold: 3
          httpGet:
            path: /healthz
            port: http
            scheme: HTTP
          periodSeconds: 10
          successThreshold: 1
          timeoutSeconds: 1
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          privileged: false
          readOnlyRootFilesystem: true
          runAsGroup: 65532
          runAsNonRoot: true
          runAsUser: 65532
      serviceAccount: bambu-exporter
      serviceAccountName: bambu-exporter
      securityContext:
        fsGroup: 65534
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
