---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  labels:
    app.kubernetes.io/instance: unpoller
    app.kubernetes.io/name: unpoller
  name: unpoller
spec:
  resourcePolicy:
    containerPolicies:
    - containerName: unpoller
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: unpoller
  updatePolicy:
    updateMode: "Off"
