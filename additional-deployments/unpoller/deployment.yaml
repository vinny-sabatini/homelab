---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/instance: unpoller
    app.kubernetes.io/name: unpoller
    app.kubernetes.io/version: v2.39.0
  name: unpoller
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: unpoller
      app.kubernetes.io/name: unpoller
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: unpoller
        app.kubernetes.io/name: unpoller
    spec:
      containers:
      - env:
        - name: UP_UNIFI_DEFAULT_URL
          value: "https://192.168.1.1"
        - name: UP_INFLUXDB_DISABLE
          value: "true"
        - name: UP_UNIFI_DEFAULT_API_KEY
          valueFrom:
            secretKeyRef:
              name: unifi-token
              key: token
        image: ghcr.io/unpoller/unpoller:v2.39.0
        name: unpoller
        ports:
        - containerPort: 9130
          name: http
          protocol: TCP
        readinessProbe:
          failureThreshold: 3
          httpGet:
            path: /health
            port: http
            scheme: HTTP
          periodSeconds: 10
          successThreshold: 1
          timeoutSeconds: 1
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
          runAsGroup: 65532
          runAsNonRoot: true
          runAsUser: 65532
      serviceAccount: unpoller
      serviceAccountName: unpoller
      securityContext:
        fsGroup: 65534
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
