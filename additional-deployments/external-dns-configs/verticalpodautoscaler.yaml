apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  labels:
    app.kubernetes.io/instance: external-dns
    app.kubernetes.io/name: external-dns
  name: external-dns
spec:
  resourcePolicy:
    containerPolicies:
    - containerName: external-dns
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: external-dns
  updatePolicy:
    updateMode: "Off"
