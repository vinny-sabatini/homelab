---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  name: loki
  namespace: monitoring
spec:
  datasource:
    access: proxy
    type: loki
    jsonData:
      timeInterval: 5s
      tlsSkipVerify: true
    name: loki
    url: http://loki-gateway.loki.svc.cluster.local:80
    orgId: 1
  instanceSelector:
    matchLabels:
      dashboards: grafana
