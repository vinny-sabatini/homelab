---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: version-checker
  namespace: argocd
  finalizers:
    # The default behaviour is foreground cascading deletion
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    chart: version-checker
    repoURL: https://charts.jetstack.io
    targetRevision: v0.10.0
    helm:
      releaseName: version-checker
      values: |
        dashboards:
          enabled: true
          grafana: grafana
        env:
          - name: VERSION_CHECKER_GHCR_TOKEN
            valueFrom:
              secretKeyRef:
                name: version-checker
                key: ghcr-token
          - name: VERSION_CHECKER_DOCKER_TOKEN
            valueFrom:
              secretKeyRef:
                name: version-checker
                key: docker-token
  destination:
    server: "https://kubernetes.default.svc"
    namespace: version-checker
  syncPolicy:
    automated:
      enabled: true
      prune: true
      selfHeal: true
