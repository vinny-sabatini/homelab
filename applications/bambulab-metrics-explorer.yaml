---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: bambulab-metrics-exporter
  namespace: argocd
  finalizers:
    # The default behaviour is foreground cascading deletion
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    path: additional-deployments/bambulab-metrics-exporter
    repoURL: https://github.com/vinny-sabatini/homelab.git
    targetRevision: main
  destination:
    namespace: bambulab-metrics-exporter
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      enabled: true
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
