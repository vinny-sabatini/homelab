---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus
  namespace: argocd
  finalizers:
    # The default behaviour is foreground cascading deletion
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    chart: kube-prometheus-stack
    repoURL: https://prometheus-community.github.io/helm-charts
    targetRevision: 82.15.1
    helm:
      releaseName: cluster
      values: |
        fullnameOverride: kube-prom
        kubeProxy:
          enabled: false
        kubeEtcd:
          service:
            enabled: true
            port: 2379
            targetPort: 2379
            selector:
              k8s-app: kube-controller-manager # or any other service like kube-proxy or kube-scheduler
          # TODO: Handle this better, this secret is currently generated using talosctl
          # Ref https://github.com/siderolabs/talos/discussions/7214#discussioncomment-11709688
          serviceMonitor:
            scheme: https
            insecureSkipVerify: false
            caFile: "/etc/prometheus/secrets/etcd-client-cert/etcd-ca.crt"
            certFile: "/etc/prometheus/secrets/etcd-client-cert/etcd-client.crt"
            keyFile: "/etc/prometheus/secrets/etcd-client-cert/etcd-client-key.key"
        prometheus:
          prometheusSpec:
            secrets:
              - etcd-client-cert
            serviceMonitorSelectorNilUsesHelmValues: false
            serviceMonitorNamespaceSelector: {}
            probeSelectorNilUsesHelmValues: false
            probeNamespaceSelector: {}
            scrapeConfigSelectorNilUsesHelmValues: false
            scrapeConfigNamespaceSelector: {}
            podMonitorSelectorNilUsesHelmValues: false
            podMonitorNamespaceSelector: {}
            ruleSelectorNilUsesHelmValues: false
            ruleNamespaceSelector: {}
            storageSpec:
              volumeClaimTemplate:
                spec:
                  storageClassName: local-path
                  resources:
                    requests:
                      storage: 40Gi
        grafana:
          enabled: false
          forceDeployDashboards: true
        alertmanager:
          alertmanagerSpec:
            secrets:
            - discord-webhook
          config:
            global:
              resolve_timeout: 5m
            inhibit_rules: []
            route:
              group_by: ['alertname']
              group_wait: 30s
              group_interval: 5m
              repeat_interval: 12h
              receiver: 'discord'
              routes:
              - receiver: 'null'
                matchers:
                  - alertname = "Watchdog"
              - receiver: 'discord'
                continue: true
            receivers:
            - name: 'null'
            - name: 'discord'
              discord_configs:
                avatar_url: https://github.com/NX211/homer-icons/blob/master/png/prometheus.png?raw=true
                username: prometheus
                webhook_url_file: /etc/alertmanager/secrets/discord-webhook/discord-webhook
            templates:
            - '/etc/alertmanager/config/*.tmpl'
          useExistingSecret: true
        extraManifests:
        - |
          apiVersion: external-secrets.io/v1
          kind: ExternalSecret
          metadata:
            name: discord-webhook
          spec:
            refreshInterval: 1h0m0s
            secretStoreRef:
              name: bitwarden-secretsmanager
              kind: ClusterSecretStore
            data:
              - secretKey: discord-webhook
                remoteRef:
                  key: "discord_webhook"
  destination:
    server: "https://kubernetes.default.svc"
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    managedNamespaceMetadata:
      labels:
        pod-security.kubernetes.io/enforce: privileged
    syncOptions:
    - CreateNamespace=true
    - ServerSideApply=true
