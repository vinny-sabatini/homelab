---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus
  namespace: argocd
  finalizers:
    # The default behaviour is foreground cascading deletion
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    chart: kube-prometheus-stack
    repoURL: https://prometheus-community.github.io/helm-charts
    targetRevision: 82.15.1
    helm:
      releaseName: cluster
      values: |
        fullnameOverride: kube-prom
        kubeProxy:
          enabled: false
        kubeEtcd:
          service:
            enabled: true
            port: 2379
            targetPort: 2379
            selector:
              k8s-app: kube-controller-manager # or any other service like kube-proxy or kube-scheduler
          # TODO: Handle this better, this secret is currently generated using talosctl
          # Ref https://github.com/siderolabs/talos/discussions/7214#discussioncomment-11709688
          serviceMonitor:
            scheme: https
            insecureSkipVerify: false
            caFile: "/etc/prometheus/secrets/etcd-client-cert/etcd-ca.crt"
            certFile: "/etc/prometheus/secrets/etcd-client-cert/etcd-client.crt"
            keyFile: "/etc/prometheus/secrets/etcd-client-cert/etcd-client-key.key"
        prometheus:
          prometheusSpec:
            secrets:
              - etcd-client-cert
            serviceMonitorSelectorNilUsesHelmValues: false
            serviceMonitorNamespaceSelector: {}
            probeSelectorNilUsesHelmValues: false
            probeNamespaceSelector: {}
            scrapeConfigSelectorNilUsesHelmValues: false
            scrapeConfigNamespaceSelector: {}
            podMonitorSelectorNilUsesHelmValues: false
            podMonitorNamespaceSelector: {}
            ruleSelectorNilUsesHelmValues: false
            ruleNamespaceSelector: {}
            storageSpec:
              volumeClaimTemplate:
                spec:
                  storageClassName: local-path
                  resources:
                    requests:
                      storage: 40Gi
        grafana:
          enabled: false
          forceDeployDashboards: true
        alertmanager:
          alertmanagerSpec:
            alertmanagerConfiguration:
              name: global-alertmanager-configuration
        extraManifests:
        - |
          apiVersion: external-secrets.io/v1
          kind: ExternalSecret
          metadata:
            name: discord-webhook
          spec:
            refreshInterval: 1h0m0s
            secretStoreRef:
              name: bitwarden-secretsmanager
              kind: ClusterSecretStore
            data:
              - secretKey: discord-webhook
                remoteRef:
                  key: "discord_webhook"
        - |
          apiVersion: monitoring.coreos.com/v1alpha1
          kind: AlertmanagerConfig
          metadata:
            name: global-alertmanager-configuration
          spec:
            route:
              groupBy: ['alertname']
              groupWait: 30s
              groupInterval: 5m
              repeatInterval: 12h
              receiver: 'discord'
            receivers:
            - name: 'discord'
              discordConfigs:
              - apiURL:
                  key: discord-webhook
                  name: discord-webhook
                username: prometheus
                avatarURL: https://github.com/NX211/homer-icons/blob/master/png/prometheus.png?raw=true

  destination:
    server: "https://kubernetes.default.svc"
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    managedNamespaceMetadata:
      labels:
        pod-security.kubernetes.io/enforce: privileged
    syncOptions:
    - CreateNamespace=true
    - ServerSideApply=true
