---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus-blackbox-exporter
  namespace: argocd
  finalizers:
    # The default behaviour is foreground cascading deletion
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    chart: prometheus-blackbox-exporter
    repoURL: https://prometheus-community.github.io/helm-charts
    targetRevision: 11.9.1
    helm:
      releaseName: cluster
      values: |
        serviceMonitor:
          enabled: true
          selfMonitor:
            enabled: true
        verticalPodAutoscaler:
          enabled: true
          updatePolicy:
            updateMode: "Off"
        extraManifests:
        - kind: Probe
          apiVersion: monitoring.coreos.com/v1
          metadata:
            name: cluster-probes
          spec:
            interval: 60s
            module: http_2xx
            prober:
              url: cluster-prometheus-blackbox-exporter.monitoring.svc.cluster.local:9115
            targets:
              staticConfig:
                static:
                - https://alertmanager.vinnysabatini.me/-/healthy
                - https://argocd.vinnysabatini.me/healthz
                - https://prometheus.vinnysabatini.me/-/healthy
                - https://headlamp.vinnysabatini.me/
                - https://grafana.vinnysabatini.me/api/health
  destination:
    server: "https://kubernetes.default.svc"
    namespace: monitoring
  syncPolicy:
    automated:
      enabled: true
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
    - ServerSideApply=true
