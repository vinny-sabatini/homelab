---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki
  namespace: argocd
  finalizers:
    # The default behaviour is foreground cascading deletion
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    chart: loki
    repoURL: https://grafana-community.github.io/helm-charts
    targetRevision: 13.2.2
    helm:
      releaseName: loki
      values: |
        loki:
          auth_enabled: false
          schemaConfig:
            configs:
              - from: "2024-04-01"
                store: tsdb
                object_store: s3
                schema: v13
                index:
                  prefix: loki_index_
                  period: 24h
          ingester:
            chunk_encoding: snappy
          querier:
            # Default is 4, if you have enough memory and CPU you can increase, reduce if OOMing
            max_concurrent: 4
          pattern_ingester:
            enabled: true
          limits_config:
            allow_structured_metadata: true
            volume_enabled: true
        deploymentMode: Distributed
        ingester:
          replicas: 1
          zoneAwareReplication:
            enabled: false
        monitoring:
          dashboards:
            enabled: true
          rules:
            enabled: true
          serviceMonitor:
            enabled: true
        querier:
          replicas: 1
        queryFrontend:
          replicas: 1
        queryScheduler:
          replicas: 1
        distributor:
          replicas: 1
        compactor:
          replicas: 1
        indexGateway:
          replicas: 1
        bloomPlanner:
          replicas: 0
        bloomBuilder:
          replicas: 0
        bloomGateway:
          replicas: 0
        backend:
          replicas: 0
        read:
          replicas: 0
        write:
          replicas: 0
        singleBinary:
          replicas: 0
        gateway:
          enabled: true
        minio:
          enabled: true
  destination:
    server: "https://kubernetes.default.svc"
    namespace: loki
  syncPolicy:
    automated:
      enabled: true
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
