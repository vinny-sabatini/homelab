---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki
  namespace: argocd
  finalizers:
    # The default behaviour is foreground cascading deletion
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    chart: loki
    repoURL: https://grafana-community.github.io/helm-charts
    targetRevision: 13.2.2
    helm:
      releaseName: loki
      values: |
        loki:
          auth_enabled: false
          commonConfig:
            replication_factor: 1
          schemaConfig:
            configs:
              - from: "2024-04-01"
                store: tsdb
                object_store: s3
                schema: v13
                index:
                  prefix: loki_index_
                  period: 24h
          pattern_ingester:
            enabled: true
          limits_config:
            allow_structured_metadata: true
            volume_enabled: true
          ruler:
            enable_api: true
        monitoring:
          dashboards:
            enabled: false
          rules:
            enabled: true
          serviceMonitor:
            enabled: true
        minio:
          enabled: true
        deploymentMode: SingleBinary
        singleBinary:
          replicas: 1
        gateway:
          affinity: {}
        # Zero out replica counts of other deployment modes
        backend:
          replicas: 0
        read:
          replicas: 0
        write:
          replicas: 0
        ingester:
          replicas: 0
        querier:
          replicas: 0
        queryFrontend:
          replicas: 0
        queryScheduler:
          replicas: 0
        distributor:
          replicas: 0
        compactor:
          replicas: 0
        indexGateway:
          replicas: 0
        bloomPlanner:
          replicas: 0
        bloomBuilder:
          replicas: 0
        bloomGateway:
          replicas: 0
        extraObjects:
        - |
          apiVersion: autoscaling.k8s.io/v1
          kind: VerticalPodAutoscaler
          metadata:
            labels:
              app.kubernetes.io/instance: loki-gateway
              app.kubernetes.io/name: loki-gateway
              app.kubernetes.io/part-of: loki
            name: loki-gateway
          spec:
            resourcePolicy:
              containerPolicies:
              - containerName: nginx
            targetRef:
              apiVersion: apps/v1
              kind: Deployment
              name: loki-gateway
            updatePolicy:
              updateMode: "Off"
        - |
          apiVersion: autoscaling.k8s.io/v1
          kind: VerticalPodAutoscaler
          metadata:
            labels:
              app.kubernetes.io/instance: loki-canary
              app.kubernetes.io/name: loki-canary
              app.kubernetes.io/part-of: loki
            name: loki-canary
          spec:
            resourcePolicy:
              containerPolicies:
              - containerName: canary
            targetRef:
              apiVersion: apps/v1
              kind: DaemonSet
              name: loki-canary
            updatePolicy:
              updateMode: "Off"
        - |
          apiVersion: autoscaling.k8s.io/v1
          kind: VerticalPodAutoscaler
          metadata:
            labels:
              app.kubernetes.io/instance: loki
              app.kubernetes.io/name: loki
              app.kubernetes.io/part-of: loki
            name: loki
          spec:
            resourcePolicy:
              containerPolicies:
              - containerName: loki
            targetRef:
              apiVersion: apps/v1
              kind: StatefulSet
              name: loki
            updatePolicy:
              updateMode: "Off"
        - |
          apiVersion: autoscaling.k8s.io/v1
          kind: VerticalPodAutoscaler
          metadata:
            labels:
              app.kubernetes.io/instance: loki-minio
              app.kubernetes.io/name: loki-minio
              app.kubernetes.io/part-of: loki
            name: loki-minio
          spec:
            resourcePolicy:
              containerPolicies:
              - containerName: minio
            targetRef:
              apiVersion: apps/v1
              kind: StatefulSet
              name: loki-minio
            updatePolicy:
              updateMode: "Off"
        - |
          apiVersion: autoscaling.k8s.io/v1
          kind: VerticalPodAutoscaler
          metadata:
            labels:
              app.kubernetes.io/instance: loki-chunks-cache
              app.kubernetes.io/name: loki-chunks-cache
              app.kubernetes.io/part-of: loki
            name: loki-chunks-cache
          spec:
            resourcePolicy:
              containerPolicies:
              - containerName: memcached
            targetRef:
              apiVersion: apps/v1
              kind: StatefulSet
              name: loki-chunks-cache
            updatePolicy:
              updateMode: "Off"
        - |
          apiVersion: autoscaling.k8s.io/v1
          kind: VerticalPodAutoscaler
          metadata:
            labels:
              app.kubernetes.io/instance: loki-results-cache
              app.kubernetes.io/name: loki-results-cache
              app.kubernetes.io/part-of: loki
            name: loki-results-cache
          spec:
            resourcePolicy:
              containerPolicies:
              - containerName: memcached
            targetRef:
              apiVersion: apps/v1
              kind: StatefulSet
              name: loki-results-cache
            updatePolicy:
              updateMode: "Off"
  destination:
    server: "https://kubernetes.default.svc"
    namespace: loki
  syncPolicy:
    automated:
      enabled: true
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
