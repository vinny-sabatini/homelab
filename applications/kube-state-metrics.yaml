                          labelsFromPath:
                            container: [containerName]
                          valueFrom: [uncappedTarget, cpu]
                - groupVersionKind:
                    group: gateway.networking.k8s.io
                    kind: "Gateway"
                    version: "v1beta1"
                  metricNamePrefix: gatewayapi_gateway
                  labelsFromPath:
                    name:
                    - metadata
                    - name
                    namespace:
                    - metadata
