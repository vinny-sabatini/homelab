                        path: [metadata]
                        labelsFromPath:
                          "*": [labels]
                  - name: "created"
                    help: "created timestamp"
                    each:
                      type: Gauge
                      gauge:
                        path: [metadata, creationTimestamp]
                  - name: "deleted"
                    help: "deletion timestamp"
                    each:
                      type: Gauge
                      gauge:
                        path: [metadata, deletionTimestamp]
                        nilIsZero: true
                  - name: "listener_info"
                    help: "Gateway listener information"
                    each:
                      type: Info
                      info:
                        path: [spec, listeners]
                        labelsFromPath:
                          listener_name: ["name"]
                          port: ["port"]
                          protocol: ["protocol"]
                          hostname: ["hostname"]
                          tls_mode: ["tls","mode"]
                          allowed_routes_namespaces_from: ["allowedRoutes", "namespaces", "from"]
                  - name: "status"
                    help: "status condition"
