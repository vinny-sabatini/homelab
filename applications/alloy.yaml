---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: alloy
  namespace: argocd
  finalizers:
    # The default behaviour is foreground cascading deletion
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    chart: alloy
    repoURL: https://grafana.github.io/helm-charts
    targetRevision: 1.7.0
    helm:
      releaseName: alloy
      values: |
        serviceMonitor:
          enabled: true
        extraObjects:
        - apiVersion: gateway.networking.k8s.io/v1
          kind: HTTPRoute
          metadata:
            annotations:
              external-dns.alpha.kubernetes.io/hostname: alloy.vinnysabatini.me
            labels:
              app.kubernetes.io/name: alloy
            name: alloy
          spec:
            hostnames:
            - alloy.vinnysabatini.me
            parentRefs:
            - group: gateway.networking.k8s.io
              kind: Gateway
              name: cluster-gateway
              namespace: kube-system
            rules:
            - backendRefs:
              - group: ""
                kind: Service
                name: alloy
                port: 12345
                weight: 1
              matches:
              - path:
                  type: PathPrefix
                  value: /
        alloy:
          configMap:
            content: |
              logging {
                level  = "info"
                format = "logfmt"
              }
              livedebugging {
                enabled = true
              }

              discovery.kubernetes "pod" {
                role = "pod"
              }
              discovery.relabel "pod_logs" {
                targets = discovery.kubernetes.pod.targets
                rule {
                  source_labels = ["__meta_kubernetes_namespace"]
                  action = "replace"
                  target_label = "namespace"
                }
                rule {
                  source_labels = ["__meta_kubernetes_pod_name"]
                  action = "replace"
                  target_label = "pod"
                }
                rule {
                  source_labels = ["__meta_kubernetes_pod_container_name"]
                  action = "replace"
                  target_label = "container_name"
                }
                rule {
                  source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_name"]
                  action = "replace"
                  target_label = "app"
                }
                rule {
                  source_labels = ["__meta_kubernetes_namespace", "__meta_kubernetes_pod_container_name"]
                  action = "replace"
                  target_label = "job"
                  separator = "/"
                  replacement = "$1"
                }
                rule {
                  source_labels = ["__meta_kubernetes_pod_uid", "__meta_kubernetes_pod_container_name"]
                  action = "replace"
                  target_label = "__path__"
                  separator = "/"
                  replacement = "/var/log/pods/*$1/*.log"
                }
                rule {
                  source_labels = ["__meta_kubernetes_pod_container_id"]
                  action = "replace"
                  target_label = "container_runtime"
                  regex = "^(\\S+):\\/\\/.+$"
                  replacement = "$1"
                }
              }

              loki.write "default" {
                endpoint {
                  url = "http://loki-gateway.loki.svc.cluster.local:80/loki/api/v1/push"
                  tenant_id = "local"
                }
              }

              loki.source.kubernetes "pod_logs" {
                targets = discovery.relabel.pod_logs.output
                forward_to = [loki.process.pod_logs.receiver]
              }
              loki.source.kubernetes_events "cluster_events" {
                job_name   = "kubernetes_events"
                log_format = "logfmt"
                forward_to = [
                  loki.process.cluster_events.receiver,
                ]
              }

              loki.process "pod_logs" {
                stage.static_labels {
                  values = {
                    cluster = "homelab",
                    source = "pod_logs",
                  }
                }
                forward_to = [loki.write.default.receiver]
              }
              loki.process "cluster_events" {
                forward_to = [loki.write.default.receiver]

                stage.static_labels {
                  values = {
                    cluster = "homelab",
                    source  = "kubernetes_events",
                  }
                }
              }

  destination:
    server: "https://kubernetes.default.svc"
    namespace: alloy
  syncPolicy:
    automated:
      enabled: true
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
